<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Teste Chat WebSocket</title>
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6.1.2/bundles/stomp.umd.min.js"></script>
  <style>
    body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    input, button { display: block; width: 100%; margin: 6px 0; padding: 8px; box-sizing: border-box; }
    button { cursor: pointer; background: #333; color: #fff; border: none; }
    button:disabled { background: #999; }
    #log { border: 1px solid #ccc; height: 220px; overflow-y: auto; padding: 10px; margin-top: 10px; background: #f9f9f9; }
    .recv { color: #006622; }
    .sent { color: #003399; }
    .err  { color: #cc0000; }
    .info { color: #666; }
    hr { margin: 24px 0; }
  </style>
</head>
<body>

<h3>1. Login (pega o token)</h3>
<input id="loginEmail" placeholder="email" value="">
<input id="loginPassword" placeholder="senha" type="password" value="">
<button onclick="doLogin()">Fazer login</button>
<div id="tokenBox" style="word-break:break-all; font-size:11px; color:#555; margin-top:6px;"></div>

<hr>

<h3>2. Conectar ao WebSocket</h3>
<input id="tokenInput" placeholder="Cole o token JWT aqui">
<button id="btnConnect" onclick="connect()">Conectar</button>
<button id="btnDisconnect" onclick="disconnect()" disabled>Desconectar</button>

<hr>

<h3>3. Enviar mensagem</h3>
<input id="senderIdInput" placeholder="Seu userId (Long)">
<input id="receiverIdInput" placeholder="userId do destinatário (Long)">
<input id="msgInput" placeholder="Mensagem">
<button id="btnSend" onclick="sendMsg()" disabled>Enviar</button>

<hr>

<div id="log"></div>

<script>
  let stompClient = null;

  function log(text, css) {
    const el = document.getElementById('log');
    const line = document.createElement('div');
    line.className = css || '';
    line.textContent = new Date().toLocaleTimeString() + ' | ' + text;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    try {
      const res = await fetch('http://localhost:8080/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, phoneNumber: '', password })
      });
      if (!res.ok) { log('Login falhou: ' + res.status, 'err'); return; }
      const data = await res.json();
      document.getElementById('tokenInput').value = data.token;
      document.getElementById('tokenBox').textContent = 'Token: ' + data.token;
      log('Login ok. Token copiado para o campo abaixo.', 'info');
    } catch(e) {
      log('Erro no login: ' + e.message, 'err');
    }
  }

  function connect() {
    const token = document.getElementById('tokenInput').value.trim();
    if (!token) { log('Informe o token JWT.', 'err'); return; }

    stompClient = new StompJs.Client({
      webSocketFactory: () => new SockJS('http://localhost:8080/ws'),
      connectHeaders: { Authorization: 'Bearer ' + token },
      debug: str => log('[debug] ' + str, 'info'),
      reconnectDelay: 0,

      onConnect: () => {
        log('Conectado!', 'info');
        document.getElementById('btnConnect').disabled = true;
        document.getElementById('btnDisconnect').disabled = false;
        document.getElementById('btnSend').disabled = false;

        stompClient.subscribe('/user/queue/messages', msg => {
          const body = JSON.parse(msg.body);
          log('RECEBIDO de ' + body.senderId + ': ' + body.content, 'recv');
        });
      },

      onDisconnect: () => {
        log('Desconectado.', 'info');
        document.getElementById('btnConnect').disabled = false;
        document.getElementById('btnDisconnect').disabled = true;
        document.getElementById('btnSend').disabled = true;
      },

      onStompError: frame => {
        log('Erro STOMP: ' + frame.headers['message'], 'err');
      }
    });

    stompClient.activate();
  }

  function disconnect() {
    if (stompClient) stompClient.deactivate();
  }

  function sendMsg() {
    const senderId = document.getElementById('senderIdInput').value;
    const receiverId = document.getElementById('receiverIdInput').value;
    const content = document.getElementById('msgInput').value;
    if (!senderId || !receiverId || !content) {
      log('Preencha senderId, receiverId e a mensagem.', 'err');
      return;
    }
    stompClient.publish({
      destination: '/app/chat.send',
      body: JSON.stringify({ senderId: Number(senderId), receiverId: Number(receiverId), content })
    });
    log('ENVIADO para ' + receiverId + ': ' + content, 'sent');
    document.getElementById('msgInput').value = '';
  }
</script>
</body>
</html>
